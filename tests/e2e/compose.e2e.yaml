services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: e2e
      AI_CONSENT_VERSION: e2e-consent-v1
      CORS_ORIGINS: '["http://127.0.0.1:${WEB_PORT:-13000}"]'
      OPENCLAW_COMMAND: /workspace/tests/e2e/fake_openclaw.py
      OPENCLAW_ASSISTANT_MODEL: e2e-model
      OPENCLAW_ASSISTANT_MAX_ATTEMPTS: "2"
      OPENCLAW_ASSISTANT_RETRY_BACKOFF_SECONDS: "0"
      E2E_OPENCLAW_FAIL_PACK_CV_ONCE: "1"
  web:
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:${API_PORT:-18000}
