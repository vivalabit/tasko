name: tasko

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: >-
      sh -c "if [ \"$$AI_BACKEND_MODE\" = \"openclaw_codex\" ]; then
      python -m app.core.openclaw_state; fi &&
      exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://tasko:tasko@postgres:5432/tasko
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      AI_BACKEND_MODE: ${AI_BACKEND_MODE:-openclaw_codex}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_MODEL: ${OPENAI_API_MODEL:-gpt-5.6-terra}
      OPENCLAW_COMMAND: openclaw
      OPENCLAW_AGENT_ID: tasko-assistant
      OPENCLAW_ASSISTANT_AGENT_ID: tasko-assistant
      OPENCLAW_ASSISTANT_MODEL: openai/gpt-5.6-terra
      OPENCLAW_ASSISTANT_THINKING: "off"
      OPENCLAW_ASSISTANT_TIMEOUT_SECONDS: "120"
      OPENCLAW_ASSISTANT_MAX_ATTEMPTS: "2"
      OPENCLAW_ASSISTANT_RETRY_BACKOFF_SECONDS: "0.8"
      OPENCLAW_ASSISTANT_MAX_PROMPT_CHARS: "48000"
      OPENCLAW_ASSISTANT_MAX_USER_MESSAGE_CHARS: "6000"
      OPENCLAW_ASSISTANT_MAX_HISTORY_MESSAGES: "12"
      OPENCLAW_ASSISTANT_MAX_HISTORY_CHARS: "8000"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - .:/workspace
      - ${HOME}/.openclaw:/root/.openclaw
      - ${HOME}/.openclaw/state:/root/.openclaw-shared-state:ro
      - openclaw-tasko-state:/root/.openclaw/state
      - ${HOME}/.openclaw/npm:${HOME}/.openclaw/npm
      - ${HOME}/.openclaw/workspace-tasko-assistant:${HOME}/.openclaw/workspace-tasko-assistant
      - ${HOME}/.openclaw/agents/tasko-assistant:${HOME}/.openclaw/agents/tasko-assistant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    command: pnpm --dir apps/web exec next dev --webpack --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages/shared:/workspace/packages/shared
      - web-root-node-modules:/workspace/node_modules
      - web-app-node-modules:/workspace/apps/web/node_modules
      - web-next-cache:/workspace/apps/web/.next
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: tasko
      POSTGRES_USER: tasko
      POSTGRES_PASSWORD: tasko
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasko -d tasko"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  web-root-node-modules:
  web-app-node-modules:
  web-next-cache:
  openclaw-tasko-state:
