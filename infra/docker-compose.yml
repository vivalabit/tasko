services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tasko-postgres
    environment:
      POSTGRES_DB: tasko
      POSTGRES_USER: tasko
      POSTGRES_PASSWORD: tasko
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tasko-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
